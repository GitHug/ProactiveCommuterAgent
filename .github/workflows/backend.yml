name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - 'shared/**'
  pull_request:
    paths:
      - 'backend/**'
      - 'shared/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install shared dependencies
        working-directory: shared
        run: npm ci

      - name: Build shared types
        working-directory: shared
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Test
        working-directory: backend
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build
